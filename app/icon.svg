<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Dark background circle -->
  <circle cx="16" cy="16" r="16" fill="#0a0a0b"/>
  <!-- Cake base -->
  <rect x="8" y="20" width="16" height="6" rx="2" fill="#d4af37" opacity="0.9"/>
  <!-- Cake middle layer -->
  <rect x="10" y="16" width="12" height="5" rx="1.5" fill="#d4af37" opacity="0.7"/>
  <!-- Candle -->
  <rect x="14.5" y="10" width="3" height="7" rx="1" fill="#f5f0eb" opacity="0.8"/>
  <!-- Flame outer -->
  <ellipse cx="16" cy="8" rx="2.5" ry="3.5" fill="#d4af37" opacity="0.6"/>
  <!-- Flame inner -->
  <ellipse cx="16" cy="8.5" rx="1.2" ry="2" fill="#f5f0eb" opacity="0.9"/>
</svg>
